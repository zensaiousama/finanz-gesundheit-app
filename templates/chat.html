<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <title>Persönlicher Berater</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <button class="header-btn" id="menuBtn" title="Gespeicherte Chats">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18"/>
                </svg>
            </button>
            <div class="mode-tabs">
                <button class="tab active" data-mode="finance">
                    <span class="tab-icon">💰</span>
                    <span class="tab-label">Finanzen</span>
                </button>
                <button class="tab" data-mode="health">
                    <span class="tab-icon">💪</span>
                    <span class="tab-label">Gesundheit</span>
                </button>
            </div>
            <button class="header-btn" id="newChatBtn" title="Neuer Chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </button>
        </header>

        <!-- Disclaimer -->
        <div class="disclaimer">
            Keine echte Finanz- oder Medizinberatung. Nur zu Informationszwecken.
        </div>

        <!-- Sidebar -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Gespeicherte Chats</h3>
                <button class="sidebar-close" id="sidebarClose">&times;</button>
            </div>
            <div class="sidebar-list" id="chatList"></div>
            <div class="sidebar-footer">
                <a href="/logout" class="sidebar-logout">Abmelden</a>
            </div>
        </aside>

        <!-- Chat messages -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-msg" id="welcomeMsg">
                <div class="welcome-icon" id="welcomeIcon">💰</div>
                <h2 id="welcomeTitle">Finanz-Berater</h2>
                <p id="welcomeText">Frag mich über Investitionen, Value Investing, Portfolioaufbau und Warren Buffetts Philosophie.</p>
            </div>
        </div>

        <!-- Input area -->
        <div class="input-area">
            <div class="image-preview" id="imagePreview" style="display:none;">
                <img id="imagePreviewImg" src="" alt="Preview">
                <button class="image-preview-remove" id="imagePreviewRemove">&times;</button>
            </div>
            <div class="input-wrapper">
                <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none;">
                <button class="attach-btn" id="attachBtn" title="Bild hochladen">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>
                <textarea id="messageInput" placeholder="Nachricht eingeben..." rows="1"></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
